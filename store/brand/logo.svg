<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="FeedHacker — element Fh">
  <!-- FeedHacker brand mark, styled as a periodic-table element cell: atomic number,
       large "Fh" symbol, element name. Fh symbol is outlined (stroke) so it renders
       font-independently; the number/name use a system sans stack. -->
  <rect width="128" height="128" rx="16" fill="#0A66C2"/>
  <rect x="5.5" y="5.5" width="117" height="117" rx="11.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.38" stroke-width="2.5"/>

  <!-- atomic number -->
  <text x="15" y="33" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">42</text>

  <!-- element symbol: Fh -->
  <g fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <path d="M39 40 V86"/>
    <path d="M39 45 H60"/>
    <path d="M39 61 H55"/>
    <path d="M70 34 V86"/>
    <path d="M70 62 C70 51 90 51 90 66 V86"/>
  </g>

  <!-- element name -->
  <text x="64" y="110" text-anchor="middle" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="13" font-weight="600" letter-spacing="0.3" fill="#FFFFFF">FeedHacker</text>
</svg>
