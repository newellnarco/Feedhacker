name: Release

# Publish a ready-to-install build so end users never touch source or build tools.
# Tag a version (e.g. `git tag v0.2.0 && git push --tags`) to cut a GitHub Release with
# the prebuilt extension zip, the Windows one-click bundle, and a best-effort MSI, and —
# when Chrome Web Store credentials are configured as secrets — to upload the same version
# to the Web Store so Google auto-updates every store user. See store/README.md.
# You can also release without pushing a tag: run this workflow manually (Actions →
# Release → Run workflow) with `publish: true`. It cuts the release straight from the
# chosen branch, tagging it `v<manifest version>` from inside the Action — handy when
# your local git can't push tags. Leave `publish` false for a build-only dry run.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Cut the GitHub Release and upload to the Chrome Web Store from this branch (tag = v<manifest version>). Off = build-only dry run."
        type: boolean
        default: false

# Least privilege by default; only the job that publishes the release gets write.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # Best-effort Windows MSI. Never blocks the release: if WiX build fails, the release
  # still ships the zips.
  msi:
    needs: build
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Stage MSI payload (prebuilt extension + installer scripts)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer/windows/payload/feedhacker | Out-Null
          Copy-Item dist/feedhacker/* installer/windows/payload/feedhacker -Recurse -Force
          New-Item -ItemType Directory -Force -Path installer/windows/payload/installer | Out-Null
          Copy-Item installer/windows/*.ps1, installer/windows/*.bat installer/windows/payload/installer -Force
      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.dotnet\tools"
      - name: Build MSI
        shell: pwsh
        working-directory: installer/windows # so `payload\**` and feedhacker.wxs resolve locally
        run: |
          $v = (Get-Content ../../dist/feedhacker/manifest.json -Raw | ConvertFrom-Json).version
          wix build feedhacker.wxs -d Version=$v -arch x64 -o "../../dist/FeedHacker-$v.msi"
      - uses: actions/upload-artifact@v4
        with:
          name: msi
          path: dist/*.msi
          if-no-files-found: ignore

  release:
    needs: [build, msi]
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # publish the GitHub Release (and, on manual publish, create/repoint the tag)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: msi
          path: dist
      - name: Create GitHub Release with prebuilt assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          # Derive the version from the built artifact so the notes match the asset
          # filenames even if the git tag and manifest.json ever disagree.
          VERSION="$(jq -r .version dist/feedhacker/manifest.json)"
          # Tag from the pushed ref, or — on a manual publish run — from the manifest
          # version, repointed at the built commit (drop any stale tag first so the
          # release attaches to THIS commit, not an old one).
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="v${VERSION}"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" >/dev/null 2>&1 || true
          else
            TAG="$GITHUB_REF_NAME"
          fi
          NOTES=$(cat <<EOF
          ## Install FeedHacker (no build, no source)

          **Easiest (Windows):** download \`feedhacker-${VERSION}-win.zip\`, unzip, double-click \`installer/install.bat\`. It installs the prebuilt extension, sets up daily auto-updates, and walks you through the one-time "Load unpacked" click Chrome requires.

          **Any browser (manual):** download \`feedhacker-${VERSION}.zip\`, unzip, open \`chrome://extensions\`, turn on **Developer mode**, click **Load unpacked**, and pick the unzipped \`feedhacker\` folder.

          > Chrome only allows silent, one-click install from the Chrome Web Store. Everything here is the closest no-account alternative.

          _These assets are published automatically only after CI passes on all three test levels (unit, integration, system)._
          EOF
          )
          shopt -s nullglob
          ASSETS=(dist/feedhacker-*.zip dist/*.msi)
          # Idempotent: a release may already exist for this tag (e.g. it was drafted in
          # the GitHub UI, which is what created the tag that triggered us). In that case
          # update it in place instead of erroring on "already exists"; otherwise create it,
          # pinning the tag to the commit we built (matters for the manual-publish path).
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "FeedHacker $TAG" \
              --notes "$NOTES"
            [ ${#ASSETS[@]} -gt 0 ] && gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "FeedHacker $TAG" \
              --notes "$NOTES" \
              "${ASSETS[@]}"
          fi

  # Chrome Web Store upload — the path that actually updates end users: Google pushes the
  # new version to every store install automatically (usually within hours-days of
  # approval). Opt-in and best-effort: it runs only when the CWS_* secrets are set, and
  # continue-on-error means a missing/rejected upload never fails the GitHub Release above.
  # Requires (repo Settings → Secrets and variables → Actions):
  #   secrets CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN  (Google OAuth creds)
  #   variable CWS_AUTO_PUBLISH = "true" to submit for review automatically; otherwise the
  #            new version is uploaded as a draft and you click "Publish" in the dashboard.
  # The store rejects a version that isn't higher than the live one, so bump manifest.json
  # every release (package.json is kept in lockstep).
  webstore:
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}       # job-level so the guard `if` can read it
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Locate the store package
        id: zip
        run: |
          set -e
          zip="$(ls dist/feedhacker-*-store.zip | head -1)"
          test -n "$zip"
          echo "path=$zip" >> "$GITHUB_OUTPUT"
      - name: Upload to the Chrome Web Store
        if: env.CWS_CLIENT_ID != ''   # skip cleanly (green) when store publishing isn't configured
        env:
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_AUTO_PUBLISH: ${{ vars.CWS_AUTO_PUBLISH }}
          EXTENSION_ID: djfbniehjjngpkimngegnjdeamfofnoa   # public id from the store URL
        run: |
          set -e
          ARGS=(upload
            --source "${{ steps.zip.outputs.path }}"
            --extension-id "$EXTENSION_ID"
            --client-id "$CWS_CLIENT_ID"
            --client-secret "$CWS_CLIENT_SECRET"
            --refresh-token "$CWS_REFRESH_TOKEN")
          if [ "${CWS_AUTO_PUBLISH:-}" = "true" ]; then ARGS+=(--auto-publish); fi
          npx --yes chrome-webstore-upload-cli@3 "${ARGS[@]}"
