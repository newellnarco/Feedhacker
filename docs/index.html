<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FeedHacker</title>
  <meta name="description" content="FeedHacker — mute the noise in your LinkedIn feed: AI slop, promoted posts, engagement bait, and more.">
  <style>
    :root { color-scheme: light dark; }
    body { max-width: 640px; margin: 0 auto; padding: 56px 22px;
      font: 16px/1.6 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; color: #1d2226; background: #f6f7f9; text-align: center; }
    h1 { font-size: 30px; margin: 0 0 8px; }
    p { color: #4a5560; margin: 0 0 28px; }
    .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    a.btn { text-decoration: none; border: 1px solid #c7ccd4; border-radius: 10px;
      padding: 10px 18px; color: #0a66c2; font-weight: 600; background: #fff; }
    a.btn.primary { background: #0a66c2; color: #fff; border-color: #0a66c2; }
    a.btn:hover { filter: brightness(0.97); }
    @media (prefers-color-scheme: dark) {
      body { color: #e7e9ec; background: #14171a; }
      p { color: #9aa4b0; }
      a.btn { background: #1e242a; border-color: #2b3138; }
      a.btn.primary { background: #2f6fd0; border-color: #2f6fd0; color: #fff; }
    }
  </style>
</head>
<body>
  <h1>FeedHacker</h1>
  <p>Mute the noise in your LinkedIn feed — AI slop, promoted posts, engagement bait,
     hiring posts, and more. Runs entirely in your browser; nothing is sent to any server.</p>
  <div class="links">
    <a class="btn primary" href="https://chromewebstore.google.com/detail/feedhacker/kccajfoghkplakndamlohpepopdpelkb">Chrome Web Store</a>
    <a class="btn" href="https://github.com/newellnarco/Feedhacker">Source on GitHub</a>
    <a class="btn" href="privacy-policy.html">Privacy Policy</a>
  </div>
</body>
</html>
